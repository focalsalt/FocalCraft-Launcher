<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Linear Gradient for Background -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3bb44a" />
      <stop offset="100%" stop-color="#2d8f3d" />
    </linearGradient>
    
    <!-- Drop Shadow Filter for SVG Paths -->
    <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.4" />
    </filter>
  </defs>

  <!-- Background Rounded Rect -->
  <rect width="512" height="512" rx="128" ry="128" fill="url(#bgGrad)" />

  <!-- Centered SVG Paths with Drop Shadow -->
  <g transform="translate(115, 115) scale(11.75)" filter="url(#dropShadow)">
    <path d="M14.5 2.5c0 1.5-1.5 7-1.5 7h-2S9 4 9 2.5a2.5 2.5 0 0 1 5 0Z" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M8.5 12.5A4.5 4.5 0 0 0 11 21h2a4.5 4.5 0 0 0 2.5-8.5" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M11 10v4" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    <path d="M13 10v4" fill="none" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
  </g>
</svg>
